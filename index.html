<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unit 4 English Tutor</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #ffffff;
      color: #111;
      margin: 0;
      padding: 0;
      text-align: center;
    }

    .container {
      max-width: 760px;
      margin: 40px auto;
      padding: 0 20px;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 14px;
      letter-spacing: 1px;
    }

    .subtitle {
      font-size: 16px;
      color: #333;
      margin-bottom: 20px;
    }

    #chatBox {
      width: 100%;
      height: 320px;
      border: 1px solid #ccc;
      border-radius: 8px;
      text-align: left;
      padding: 28px 18px;
      box-sizing: border-box;
      overflow-y: auto;
      margin-bottom: 20px;
      font-size: 16px;
      line-height: 1.6;
    }

    .message {
      margin-bottom: 14px;
    }

    .tutor-label {
      color: green;
      font-weight: bold;
    }

    .you-label {
      color: #1d4ed8;
      font-weight: bold;
    }

    #speakButton {
      font-size: 18px;
      padding: 16px 28px;
      border: 1px solid #ccc;
      border-radius: 10px;
      background: white;
      cursor: pointer;
    }

    #speakButton:hover {
      background: #f5f5f5;
    }

    #speakButton:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    #status {
      margin-top: 16px;
      font-size: 14px;
      color: #444;
      min-height: 20px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Unit 4 English Tutor 🎧</h1>
    <div class="subtitle">Tap the microphone and speak in English.</div>

    <div id="chatBox">
      <div class="message">
        <span class="tutor-label">Tutor:</span>
        Hi. Let's talk about traveling!
      </div>
    </div>

    <button id="speakButton">🎤 Tap to speak</button>

    <div id="status">Ready.</div>
  </div>

  <script>
    const chatBox = document.getElementById("chatBox");
    const speakButton = document.getElementById("speakButton");
    const statusDiv = document.getElementById("status");

    let history = [];
    let recognition = null;
    let isListening = false;
    let isWaiting = false;
    let voices = [];

    function setStatus(text) {
      statusDiv.textContent = text;
    }

    function addMessage(role, text) {
      const div = document.createElement("div");
      div.className = "message";

      const label = document.createElement("span");
      label.className = role === "user" ? "you-label" : "tutor-label";
      label.textContent = role === "user" ? "You: " : "Tutor: ";

      const content = document.createElement("span");
      content.textContent = text;

      div.appendChild(label);
      div.appendChild(content);

      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function loadVoices() {
      voices = window.speechSynthesis.getVoices();
    }

    if ("speechSynthesis" in window) {
      loadVoices();
      window.speechSynthesis.onvoiceschanged = loadVoices;
    }

    function speakText(text) {
      if (!text || !("speechSynthesis" in window)) return;

      window.speechSynthesis.cancel();

      const utterance = new SpeechSynthesisUtterance(text);

      const englishVoices = voices.filter((voice) =>
        voice.lang.toLowerCase().startsWith("en")
      );

      const preferredVoice =
        englishVoices.find((voice) =>
          voice.name.toLowerCase().includes("google")
        ) ||
        englishVoices.find((voice) =>
          voice.name.toLowerCase().includes("samantha")
        ) ||
        englishVoices.find((voice) =>
          voice.name.toLowerCase().includes("zira")
        ) ||
        englishVoices[0];

      if (preferredVoice) {
        utterance.voice = preferredVoice;
        utterance.lang = preferredVoice.lang;
      } else {
        utterance.lang = "en-US";
      }

      utterance.rate = 0.9;
      utterance.pitch = 1;

      utterance.onstart = () => {
        setStatus("Speaking...");
      };

      utterance.onend = () => {
        setStatus("Ready.");
      };

      utterance.onerror = () => {
        setStatus("Voice error.");
      };

      window.speechSynthesis.speak(utterance);
    }

    async function sendMessage(userMessage) {
      if (!userMessage || isWaiting) return;

      isWaiting = true;
      speakButton.disabled = true;
      setStatus("Tutor is thinking...");

      addMessage("user", userMessage);

      try {
        const response = await fetch("/api/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            history,
            message: userMessage,
          }),
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || "API error");
        }

        const reply = data.reply || data.response || data.message || data.text;

        if (!reply) {
          throw new Error("No tutor reply found.");
        }

        addMessage("assistant", reply);

        history.push({ role: "user", content: userMessage });
        history.push({ role: "assistant", content: reply });

        speakText(reply);
      } catch (error) {
        console.error(error);
        addMessage("assistant", "Sorry, something went wrong.");
        setStatus("Error.");
      } finally {
        isWaiting = false;
        speakButton.disabled = false;
      }
    }

    if ("webkitSpeechRecognition" in window || "SpeechRecognition" in window) {
      const SpeechRecognition =
        window.SpeechRecognition || window.webkitSpeechRecognition;

      recognition = new SpeechRecognition();
      recognition.lang = "en-US";
      recognition.interimResults = false;
      recognition.continuous = false;

      recognition.onstart = () => {
        isListening = true;
        speakButton.textContent = "🛑 Listening...";
        setStatus("Listening...");
      };

      recognition.onresult = (event) => {
        const transcript = event.results[0][0].transcript;
        setStatus("You said: " + transcript);

        setTimeout(() => {
          sendMessage(transcript);
        }, 300);
      };

      recognition.onerror = (event) => {
        console.error("Speech recognition error:", event);
        setStatus("Microphone error: " + event.error);
      };

      recognition.onend = () => {
        isListening = false;
        speakButton.textContent = "🎤 Tap to speak";
      };
    } else {
      speakButton.disabled = true;
      speakButton.textContent = "Mic not supported";
      setStatus("Speech recognition is not supported in this browser.");
    }

    speakButton.addEventListener("click", () => {
      if (!recognition || isWaiting) return;

      window.speechSynthesis.cancel();

      if (isListening) {
        recognition.stop();
      } else {
        recognition.start();
      }
    });
  </script>
</body>
</html>
