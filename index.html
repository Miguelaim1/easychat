<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unit 4 English Tutor</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #ffffff;
      color: #111;
      margin: 0;
      padding: 0;
      text-align: center;
    }

    .container {
      max-width: 760px;
      margin: 40px auto;
      padding: 0 20px;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 14px;
      letter-spacing: 1px;
    }

    .subtitle {
      font-size: 16px;
      color: #333;
      margin-bottom: 20px;
    }

    #chatBox {
      width: 100%;
      height: 320px;
      border: 1px solid #ccc;
      border-radius: 8px;
      text-align: left;
      padding: 28px 18px;
      box-sizing: border-box;
      overflow-y: auto;
      margin-bottom: 20px;
      font-size: 16px;
      line-height: 1.6;
    }

    .message {
      margin-bottom: 14px;
    }

    .tutor-label {
      color: green;
      font-weight: bold;
    }

    .you-label {
      color: #1d4ed8;
      font-weight: bold;
    }

    #speakButton {
      font-size: 18px;
      padding: 16px 28px;
      border: 1px solid #ccc;
      border-radius: 10px;
      background: white;
      cursor: pointer;
    }

    #speakButton:hover {
      background: #f5f5f5;
    }

    #speakButton:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    #status {
      margin-top: 16px;
      font-size: 14px;
      color: #444;
      min-height: 20px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Let's practice English 🎧</h1>
    <div class="subtitle">Tap the microphone and speak in English.</div>

    <div id="chatBox">
      <div class="message">
        <span class="tutor-label">Tutor:</span>
        Hi. Let's talk about traveling!
      </div>
    </div>

    <button id="speakButton">🎤 Tap to speak</button>

    <div id="status">Ready.</div>
  </div>

  <script>
    const chatBox = document.getElementById("chatBox");
    const speakButton = document.getElementById("speakButton");
    const statusDiv = document.getElementById("status");

    let history = [];
    let recognition = null;
    let isListening = false;
    let isWaiting = false;
    let voices = [];

    function setStatus(text) {
      statusDiv.textContent = text;
    }

    function addMessage(role, text) {
      const div = document.createElement("div");
      div.className = "message";

      const label = document.createElement("span");
      label.className = role === "user" ? "you-label" : "tutor-label";
      label.textContent = role === "user" ? "You: " : "Tutor: ";

      const content = document.createElement("span");
      content.textContent = text;

      div.appendChild(label);
      div.appendChild(content);

      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function loadVoices() {
      voices = window.speechSynthesis.getVoices();
    }

    if ("speechSynthesis" in window) {
      loadVoices();
      window.speechSynthesis.onvoiceschanged = loadVoices;
    }

let currentAudio = null;

async function speakText(text) {
  if (!text) return;

  try {
    setStatus("Creating voice...");

    if (currentAudio) {
      currentAudio.pause();
      currentAudio = null;
    }

    const response = await fetch("/api/tts", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({ text }),
    });

    if (!response.ok) {
      throw new Error("TTS request failed");
    }

    const audioBlob = await response.blob();
    const audioUrl = URL.createObjectURL(audioBlob);

    currentAudio = new Audio(audioUrl);

    currentAudio.onplay = () => {
      setStatus("Speaking...");
    };

    currentAudio.onended = () => {
      setStatus("Ready.");
      URL.revokeObjectURL(audioUrl);
    };

    currentAudio.onerror = () => {
      setStatus("Audio playback error.");
      URL.revokeObjectURL(audioUrl);
    };

    await currentAudio.play();
  } catch (error) {
    console.error("TTS error:", error);
    setStatus("Voice error.");
  }
}

    async function sendMessage(userMessage) {
      if (!userMessage || isWaiting) return;

      isWaiting = true;
      speakButton.disabled = true;
      setStatus("Tutor is thinking...");

      addMessage("user", userMessage);

      try {
        const response = await fetch("/api/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            history,
            message: userMessage,
          }),
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || "API error");
        }

        const reply = data.reply || data.response || data.message || data.text;

        if (!reply) {
          throw new Error("No tutor reply found.");
        }

        addMessage("assistant", reply);

        history.push({ role: "user", content: userMessage });
        history.push({ role: "assistant", content: reply });

        speakText(reply);
      } catch (error) {
        console.error(error);
        addMessage("assistant", "Sorry, something went wrong.");
        setStatus("Error.");
      } finally {
        isWaiting = false;
        speakButton.disabled = false;
      }
    }

let recognition = null;
let isListening = false;

let finalTranscript = "";
let latestTranscript = "";
let silenceTimer = null;
let hasSubmittedSpeech = false;

// Change this number to control how long it waits after the student stops speaking.
// 2000 = 2 seconds
// 3000 = 3 seconds
const SPEECH_END_DELAY = 2500;

if ("webkitSpeechRecognition" in window || "SpeechRecognition" in window) {
  const SpeechRecognition =
    window.SpeechRecognition || window.webkitSpeechRecognition;

  recognition = new SpeechRecognition();
  recognition.lang = "en-US";
  recognition.interimResults = true;
  recognition.continuous = true;

  recognition.onstart = () => {
    isListening = true;
    finalTranscript = "";
    latestTranscript = "";
    hasSubmittedSpeech = false;

    if (silenceTimer) {
      clearTimeout(silenceTimer);
    }

    speakButton.textContent = "🛑 Listening...";
    setStatus("Listening...");
  };

  recognition.onresult = (event) => {
    let interimTranscript = "";

    for (let i = event.resultIndex; i < event.results.length; i++) {
      const transcript = event.results[i][0].transcript;

      if (event.results[i].isFinal) {
        finalTranscript += transcript + " ";
      } else {
        interimTranscript += transcript;
      }
    }

    latestTranscript = (finalTranscript + interimTranscript).trim();

    if (latestTranscript) {
      setStatus("Heard: " + latestTranscript);
    }

    if (silenceTimer) {
      clearTimeout(silenceTimer);
    }

    silenceTimer = setTimeout(() => {
      finishListeningAndSend();
    }, SPEECH_END_DELAY);
  };

  recognition.onerror = (event) => {
    console.error("Speech recognition error:", event);
    setStatus("Microphone error: " + event.error);
  };

  recognition.onend = () => {
    isListening = false;
    speakButton.textContent = "🎤 Tap to speak";

    // If the browser stops recognition by itself, still send the speech.
    if (!hasSubmittedSpeech && latestTranscript.trim()) {
      finishListeningAndSend();
    } else if (!latestTranscript.trim() && !isWaiting) {
      setStatus("Ready.");
    }
  };
} else {
  speakButton.disabled = true;
  speakButton.textContent = "Mic not supported";
  setStatus("Speech recognition is not supported in this browser.");
}

function finishListeningAndSend() {
  const transcriptToSend = latestTranscript.trim();

  if (!transcriptToSend || hasSubmittedSpeech || isWaiting) return;

  hasSubmittedSpeech = true;

  if (silenceTimer) {
    clearTimeout(silenceTimer);
  }

  if (recognition && isListening) {
    recognition.stop();
  }

  setStatus("You said: " + transcriptToSend);

  setTimeout(() => {
    sendMessage(transcriptToSend);
  }, 300);
}

speakButton.addEventListener("click", () => {
  if (!recognition || isWaiting) return;

  if (currentAudio) {
    currentAudio.pause();
    currentAudio = null;
  }

  if (isListening) {
    finishListeningAndSend();
  } else {
    recognition.start();
  }
});
  </script>
</body>
</html>
